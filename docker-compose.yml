  drone-norte-1:
    build:
      context: .
      dockerfile: drones/Dockerfile
    environment:
      - DRONE_ID=NORTE-drone-01
      - SERVIDOR=peer1:9090
    depends_on:
      - peer1
    networks:
      - pbl-network

