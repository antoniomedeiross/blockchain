version: '3.8'

services:
  peer1:
    build: .
    container_name: peer1
    ports:
      - "9090:9090" # No seu PC será 9090
    environment:
      - PEARS=peer2:9090,peer3:9090
      - MY_ADDR=peer1:9090
      - ZONA=NORTE
    networks:
      - pbl-network

  peer2:
    build: .
    container_name: peer2
    ports:
      - "9091:9090" # No seu PC será 9091
    environment:
      - PEARS=peer1:9090,peer3:9090
      - MY_ADDR=peer2:9090
      - ZONA=SUL
    networks:
      - pbl-network

  peer3:
    build: .
    container_name: peer3
    ports:
      - "9092:9090" # No seu PC será 9092
    environment:
      - PEARS=peer1:9090,peer2:9090
      - MY_ADDR=peer3:9090
      - ZONA=LESTE
    networks:
      - pbl-network

networks:
  pbl-network:
    driver: bridge