version: '3.8'
services:
  peer1:
    build:
      context: .
      dockerfile: zona/Dockerfile
    container_name: peer1
    ports:
      - "9090:9090"
      - "8081:8080"
    environment:
      - PEARS=peer2:9090,peer3:9090
      - MY_ADDR=peer1:9090
      - ZONA=NORTE
      - HTTP_PORT=8080
    networks:
      - pbl-network

  peer2:
    build:
      context: .
      dockerfile: zona/Dockerfile
    container_name: peer2
    ports:
      - "9091:9090"
      - "8082:8080"
    environment:
      - PEARS=peer1:9090,peer3:9090
      - MY_ADDR=peer2:9090
      - ZONA=SUL
      - HTTP_PORT=8080
    networks:
      - pbl-network

  peer3:
    build:
      context: .
      dockerfile: zona/Dockerfile
    container_name: peer3
    ports:
      - "9092:9090"
      - "8083:8080"
    environment:
      - PEARS=peer1:9090,peer2:9090
      - MY_ADDR=peer3:9090
      - ZONA=LESTE
      - HTTP_PORT=8080
    networks:
      - pbl-network

